rules:
  - id: no-eval-js
    pattern: eval(...)
    message: "Avoid using eval()"
    languages: [javascript]
    severity: ERROR
  - id: no-hardcoded-strings
    pattern: |
      $VAR = "..."
    message: "Hardcoded string may be a secret"
    languages: [php, python, javascript]
    severity: WARNING
