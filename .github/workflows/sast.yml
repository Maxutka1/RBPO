name: SAST - Static Analysis Security Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  bandit-python:
    name: Bandit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      - run: bandit -r src/python -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  eslint-js:
    name: ESLint (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g eslint eslint-plugin-security eslint-plugin-no-secrets
      - run: eslint src/js --format json -o eslint-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          continue-on-error: true

  security-gate:
    name: Security Gate (SAST)
    runs-on: ubuntu-latest
    needs: [bandit-python]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bandit-report
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Security Gate
        run: |
          # Создаём директорию ci, если её нет
          mkdir -p ci
          # Создаём скрипт прямо в раннере, если он отсутствует
          cat > ci/security_gate_bandit.py << 'EOF'
          #!/usr/bin/env python3
          import json, sys, argparse
          def check_bandit(filepath, threshold):
              with open(filepath) as f:
                  data = json.load(f)
              high_count = 0
              for r in data.get('results', []):
                  if r.get('issue_severity', '').upper() == threshold.upper():
                      high_count += 1
              return high_count
          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument('--bandit', required=True)
              parser.add_argument('--threshold', default='HIGH')
              args = parser.parse_args()
              errors = check_bandit(args.bandit, args.threshold)
              if errors > 0:
                  print(f" Security Gate failed: {errors} HIGH severity issues.")
                  sys.exit(1)
              else:
                  print(" Security Gate passed: no HIGH severity issues.")
                  sys.exit(0)
          if __name__ == '__main__':
              main()
          EOF
          python ci/security_gate_bandit.py --bandit bandit-report.json --threshold HIGH