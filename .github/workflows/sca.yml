name: SCA - Dependency Vulnerability Scanning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy (JSON output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  security-gate:
    name: Security Gate (SCA)
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: trivy-report
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Check for CRITICAL vulnerabilities
        run: |
          CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          if [ "$CRITICAL_COUNT" -eq 0 ]; then
            echo " No CRITICAL vulnerabilities found."
          else
            echo " Found $CRITICAL_COUNT CRITICAL vulnerabilities. Build blocked."
            exit 1
          fi