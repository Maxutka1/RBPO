name: DevSecOps Pipeline (SAST + SCA + DAST)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ========== СТАТИЧЕСКИЙ АНАЛИЗ (SAST) ==========
  sast:
    name: SAST (Bandit + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (Python)
        run: bandit -r src/python -f json -o bandit-report.json || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ESLint
        run: npm install -g eslint eslint-plugin-security eslint-plugin-no-secrets

      - name: Run ESLint (JavaScript)
        run: eslint src/js --format json -o eslint-report.json || true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            eslint-report.json

  # ========== АНАЛИЗ ЗАВИСИМОСТЕЙ (SCA) ==========
  sca:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            trivy-report.json
            sbom.json

  # ========== ДИНАМИЧЕСКИЙ АНАЛИЗ (DAST) ==========
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Flask app (test environment)
        run: |
          pip install flask markupsafe
          python app.py &
          sleep 10
          curl -s http://localhost:5000 || exit 1

      - name: Run ZAP full scan
        run: |
          docker run --rm --network host -v $(pwd):/zap/wrk owasp/zap2docker-stable zap-full-scan.py \
            -t http://localhost:5000 -r zap_report.html -s High || true

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: zap_report.html

  # ========== SECURITY GATE (общая проверка) ==========
  security_gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]   # Ждём завершения всех трёх этапов
    if: always()                # Запускаем даже если предыдущие упали (чтобы собрать все отчёты)
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq xmlstarlet

      - name: Evaluate Security Gate
        run: |
          echo "=== Security Gate Evaluation ==="

          # ---- SAST: Bandit (HIGH severity) ----
          if [ -f reports/sast-reports/bandit-report.json ]; then
            SAST_HIGH=$(jq '[.results[]? | select(.issue_severity == "HIGH")] | length' reports/sast-reports/bandit-report.json)
          else
            SAST_HIGH=0
          fi

          # ---- SAST: ESLint (errors only) ----
          if [ -f reports/sast-reports/eslint-report.json ]; then
            ESLINT_ERRORS=$(jq '[.[].messages[]? | select(.severity == 2)] | length' reports/sast-reports/eslint-report.json)
          else
            ESLINT_ERRORS=0
          fi
          SAST_TOTAL=$((SAST_HIGH + ESLINT_ERRORS))

          # ---- SCA: Trivy (CRITICAL) ----
          if [ -f reports/sca-reports/trivy-report.json ]; then
            SCA_CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' reports/sca-reports/trivy-report.json)
          else
            SCA_CRITICAL=0
          fi

          # ---- DAST: ZAP (High) ----
          if [ -f reports/dast-report/zap_report.html ]; then
            DAST_HIGH=$(xmlstarlet sel -t -v "count(//alert[@risk='High'])" reports/dast-report/zap_report.html 2>/dev/null || echo "0")
          else
            DAST_HIGH=0
          fi

          echo "===================================="
          echo "SAST HIGH issues        : $SAST_TOTAL"
          echo "SCA CRITICAL issues     : $SCA_CRITICAL"
          echo "DAST HIGH issues        : $DAST_HIGH"
          echo "===================================="

          BLOCK=0
          if [ "$SAST_TOTAL" -gt 0 ]; then
            echo "BLOCKED due to SAST HIGH issues"
            BLOCK=1
          fi
          if [ "$SCA_CRITICAL" -gt 0 ]; then
            echo "BLOCKED due to SCA CRITICAL issues"
            BLOCK=1
          fi
          if [ "$DAST_HIGH" -gt 0 ]; then
            echo "BLOCKED due to DAST HIGH issues"
            BLOCK=1
          fi

          if [ $BLOCK -eq 0 ]; then
            echo "Security Gate PASSED. No critical vulnerabilities."
          else
            exit 1
          fi