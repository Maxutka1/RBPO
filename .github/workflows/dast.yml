name: DAST - ZAP Docker

on: push

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Flask app
        run: |
          pip install flask
          python app.py &
          sleep 10
      - name: Run ZAP scan (Docker)
        run: |
          docker run --rm --network host -v $(pwd):/zap/wrk owasp/zap2docker-stable zap-full-scan.py \
            -t http://localhost:5000 -r zap_report.html -s High || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: zap_report.html
      - name: Check for High
        run: |
          if grep -q 'risk="High"' zap_report.html; then
            echo "❌ High найдены"
            exit 1
          else
            echo "✅ High нет"
          fi