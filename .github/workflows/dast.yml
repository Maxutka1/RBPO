name: DAST - ZAP Docker

on: push

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Flask app
        run: |
          pip install flask
          python app.py &
          sleep 10

      - name: Run ZAP scan (Docker)
        run: |
          docker run --rm --network host -v $(pwd):/zap/wrk owasp/zap2docker-stable zap-full-scan.py \
            -t http://localhost:5000 -r zap_report.html -s High || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: zap_report.html

      - name: Security Gate
        run: |
          if [ ! -f zap_report.html ]; then
            echo "ZAP report missing"
            exit 1
          fi
          HIGH_COUNT=$(grep -c 'risk="High"' zap_report.html || true)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Blocked: $HIGH_COUNT HIGH vulnerabilities found."
            exit 1
          else
            echo "No HIGH vulnerabilities. Gate passed."
          fi