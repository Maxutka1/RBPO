name: DAST - OWASP ZAP (без High)

on: push

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flask
        run: pip install flask

      - name: Start Flask app (исправленная версия)
        run: |
          python app.py &
          sleep 10
          curl -s http://localhost:5000 || (echo "App not ready"; exit 1)

      - name: OWASP ZAP Full Scan (только High вызывают ошибку)
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:5000'
          allow_issue_writing: false
          cmd_options: '-r zap_report.html -s High'   # <- игнорируем Medium/Low

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: zap_report.html

      - name: Вывод результатов
        run: |
          echo "=== Результаты ZAP ==="
          if [ -f zap_report.html ]; then
            HIGH=$(grep -o 'risk="High"' zap_report.html | wc -l)
            MED=$(grep -o 'risk="Medium"' zap_report.html | wc -l)
            LOW=$(grep -o 'risk="Low"' zap_report.html | wc -l)
            echo "High: $HIGH, Medium: $MED, Low: $LOW"
            if [ "$HIGH" -eq 0 ]; then
              echo "✅ High уязвимостей не найдено. Пайплайн успешен."
            else
              echo "❌ Найдены High уязвимости!"
              exit 1
            fi
          else
            echo "❌ Отчёт не создан"
            exit 1
          fi