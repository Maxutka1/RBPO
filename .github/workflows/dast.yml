name: DAST - OWASP ZAP Scan

on: push

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Flask
        run: pip install flask
      - name: Start Flask app
        run: |
          python app.py &
          sleep 10
          curl -s http://127.0.0.1:5000 || exit 1
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:5000'
          allow_issue_writing: false
          cmd_options: '-r zap_report.html'
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: zap_report.html
      - name: Security Gate
        run: |
          HIGH_COUNT=$(grep -c 'risk="High"' zap_report.html || true)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "❌ Blocked: $HIGH_COUNT High vulnerabilities"
            exit 1
          else
            echo "✅ No High vulnerabilities"
          fi